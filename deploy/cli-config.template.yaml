# Hermes Agent config — turtle deployment template.
# Replaced at deploy time by bootstrap-turtle.sh (see ${TURTLE} marker).

model:
  provider: "${PROVIDER}"   # "nvidia" or "openai-codex" (or any Hermes provider)
  default: "${MODEL}"        # leave empty to use provider default
  base_url: ""               # blank — let provider overlay supply the right URL.
                              # The default config.yaml ships with openrouter base_url
                              # which silently overrides any provider overlay (nvidia,
                              # openai-codex, etc.) and causes 401 against NIM.

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6
  provider: pgvector_memory   # our Supabase plugin

session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
